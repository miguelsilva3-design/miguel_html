<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Luffy by Mayara</title>
    <link href="estilo.css" rel="stylesheet">
</head>
<body>
    <div class="game">
        <div class="placar">Pulos: <span id="contador">0</span></div>

        <img src="./imagens/zeus.png" class="zeus">
        <img src="./imagens/barbanegra.png" class="barbanegra">
        <img src="./imagens/luffy.gif" class="luffy">
        <img src="./imagens/fundo.png" class="fundo">
        <img src="./imagens/mar.jpg" class="body">
    </div>
    
<div class="gameover">
    <button class="reiniciar botaopirata">
        <span class="procurado">WANTED</span>
        <span class="texto-reiniciar">TENTAR NOVAMENTE</span>
        <span class="recompensa">REWARD: ฿ 3,000,000,000</span>
    </button>
</div>

    <script src="script.js"></script>    
</body>
</html>
